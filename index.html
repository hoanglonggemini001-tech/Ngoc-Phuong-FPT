<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trung Nguyên Legend - Hệ Thống Bán Hàng Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #1a1a1a; color: #f3f4f6; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .tn-gold { color: #c5a059; }
        .bg-tn-gold { background-color: #c5a059; }
        .product-card:hover { transform: translateY(-10px); box-shadow: 0 20px 25px -5px rgba(197, 160, 89, 0.2); }
        .zalo-btn { position: fixed; bottom: 20px; right: 20px; animation: bounce 2s infinite; }
        @keyframes bounce { 0%, 20%, 50%, 80%, 100% {transform: translateY(0);} 40% {transform: translateY(-10px);} 60% {transform: translateY(-5px);} }
    </style>
</head>
<body class="pb-20">

    <nav class="bg-black border-b border-gray-800 sticky top-0 z-50 px-6 py-4 flex justify-between items-center">
        <h1 class="text-2xl font-bold tn-gold tracking-widest">TRUNG NGUYÊN <span class="text-white">SALES</span></h1>
        <div class="relative cursor-pointer" onclick="toggleCart()">
            <i class="fas fa-shopping-cart text-2xl tn-gold"></i>
            <span id="cart-count" class="absolute -top-2 -right-2 bg-red-600 text-white text-xs rounded-full h-5 w-5 flex items-center justify-center font-bold">0</span>
        </div>
    </nav>

    <header class="py-16 text-center bg-[url('https://www.transparenttextures.com/patterns/dark-matter.png')]">
        <h2 class="text-4xl font-extrabold mb-4 uppercase tracking-tighter text-white">Năng Lượng Tỉnh Thức</h2>
        <p class="tn-gold text-lg">Hệ thống phân phối cà phê cao cấp dành cho dân sành</p>
    </header>

    <main class="max-w-6xl mx-auto p-6 grid grid-cols-1 md:grid-cols-3 gap-8" id="product-list">
        </main>

    <div id="cart-sidebar" class="fixed top-0 right-0 h-full w-80 bg-zinc-900 shadow-2xl transform translate-x-full transition-transform duration-300 z-[60] p-6 border-l border-gray-700">
        <div class="flex justify-between items-center mb-6">
            <h3 class="text-xl font-bold tn-gold">Giỏ Hàng Của Bạn</h3>
            <button onclick="toggleCart()" class="text-gray-400 hover:text-white"><i class="fas fa-times"></i></button>
        </div>
        <div id="cart-items" class="space-y-4 h-[70%] overflow-y-auto">
            </div>
        <div class="border-t border-gray-700 mt-6 pt-4">
            <p class="text-lg flex justify-between">Tổng: <span id="cart-total" class="font-bold tn-gold">0đ</span></p>
            <button class="w-full bg-tn-gold text-black font-bold py-3 mt-4 rounded hover:bg-yellow-600 transition" onclick="checkout()">THANH TOÁN NGAY</button>
        </div>
    </div>

    <a href="https://zalo.me/0398431697" target="_blank" class="zalo-btn bg-blue-600 p-4 rounded-full shadow-lg flex items-center justify-center text-white text-2xl">
        <i class="fab fa-facebook-messenger"></i>
    </a>

    <script>
        const products = [
            { id: 1, name: "Cà Phê G7 3in1", price: 65000, img: "https://images.unsplash.com/photo-1559056199-641a0ac8b55e?q=80&w=200&auto=format&fit=crop" },
            { id: 2, name: "Trung Nguyên Legend Capsule", price: 150000, img: "https://images.unsplash.com/photo-1580915411954-282cb1b0d780?q=80&w=200&auto=format&fit=crop" },
            { id: 3, name: "Cà Phê Sáng Tạo 8", price: 450000, img: "https://images.unsplash.com/photo-1495474472287-4d71bcdd2085?q=80&w=200&auto=format&fit=crop" }
        ];

        let cart = JSON.parse(localStorage.getItem('tn_cart')) || [];

        function renderProducts() {
            const list = document.getElementById('product-list');
            list.innerHTML = products.map(p => `
                <div class="product-card bg-zinc-800 rounded-xl overflow-hidden transition-all duration-300 border border-gray-700 p-4">
                    <img src="${p.img}" class="w-full h-48 object-cover rounded-lg mb-4" alt="${p.name}">
                    <h3 class="text-lg font-bold mb-2">${p.name}</h3>
                    <p class="tn-gold font-bold mb-4">${p.price.toLocaleString()} VNĐ</p>
                    <button onclick="addToCart(${p.id})" class="w-full border border-tn-gold tn-gold py-2 rounded hover:bg-tn-gold hover:text-black transition duration-300">
                        <i class="fas fa-plus mr-2"></i>Thêm vào giỏ
                    </button>
                </div>
            `).join('');
        }

        function addToCart(id) {
            const p = products.find(x => x.id === id);
            cart.push(p);
            updateCart();
        }

        function updateCart() {
            localStorage.setItem('tn_cart', JSON.stringify(cart));
            document.getElementById('cart-count').innerText = cart.length;
            const itemsDiv = document.getElementById('cart-items');
            itemsDiv.innerHTML = cart.map((item, index) => `
                <div class="flex justify-between items-center bg-black p-2 rounded">
                    <div>
                        <p class="text-sm font-bold">${item.name}</p>
                        <p class="text-xs tn-gold">${item.price.toLocaleString()}đ</p>
                    </div>
                    <button onclick="removeItem(${index})" class="text-red-500 text-xs"><i class="fas fa-trash"></i></button>
                </div>
            `).join('');
            
            const total = cart.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('cart-total').innerText = total.toLocaleString() + 'đ';
        }

        function removeItem(index) {
            cart.splice(index, 1);
            updateCart();
        }

        function toggleCart() {
            const sidebar = document.getElementById('cart-sidebar');
            sidebar.classList.toggle('translate-x-full');
        }

        function checkout() {
            if(cart.length === 0) return alert("Giỏ hàng trống!");
            alert("Đã gửi đơn hàng cho hệ thống Kiểm soát nội bộ!");
            cart = [];
            updateCart();
            toggleCart();
        }

        renderProducts();
        updateCart();
    </script>
</body>
</html>
